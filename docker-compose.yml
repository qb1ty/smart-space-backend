services:
  postgres:
    image: postgres:15-alpine
    container_name: smartspace-db
    restart: always
    env_file:
      - .env
    ports:
      - '${POSTGRES_PORT}:5432'
    volumes:
      - postgres_data_1:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: smartspace-redis
    restart: always
    env_file:
      - .env
    ports:
      - '${REDIS_PORT}:6379'
    volumes:
      - redis_data:/data

volumes:
  postgres_data_1:
  redis_data: